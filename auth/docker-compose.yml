services:
  auth:
    build: .
    ports:
      - "8081:8081"
      - "8084:8080"
    environment:
      GRPC_PORT: "8081"
      HTTP_PORT: "8080"
      DATABASE_URL: "postgres://gobox:gobox@postgres:5432/gobox?sslmode=disable"
      JWT_PRIVATE_KEY_PATH: "/app/keys/private.pem"
      LOG_LEVEL: "info"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gobox

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gobox
      POSTGRES_PASSWORD: gobox
      POSTGRES_DB: gobox
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gobox"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - gobox

volumes:
  pgdata:

networks:
  gobox:
    name: gobox
    driver: bridge
