services:
  core:
    build: .
    ports:
      - "3000:8080"
    environment:
      HTTP_PORT: "8080"
      AUTH_GRPC_ADDR: "auth:8081"
      AUTH_HTTP_ADDR: "http://auth:8080"
      FILEUPLOAD_GRPC_ADDR: "fileupload:9090"
      #SHORTENER_GRPC_ADDR: "shortener:9091"
      LOG_LEVEL: "info"
      LOG_FORMAT: "pretty"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gobox

  fileupload:
    build: ../fileupload
    ports:
      - "9090:9090"
    environment:
      DATABASE_URL: "postgres://fileupload:fileupload@fileupload-postgres:5432/fileupload?sslmode=disable"
      GRPC_PORT: "9090"
      S3_ENDPOINT: "minio:9000"
      S3_BUCKET: "uploads"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      PRESIGN_UPLOAD_TTL_MINUTES: "15"
      PRESIGN_DOWNLOAD_TTL_MINUTES: "60"
      MAX_FILE_SIZE: "104857600"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"
    depends_on:
      fileupload-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gobox

  fileupload-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fileupload
      POSTGRES_PASSWORD: fileupload
      POSTGRES_DB: fileupload
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileupload"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - fileupload_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - gobox

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - gobox

volumes:
  fileupload_pgdata:
  minio_data:

networks:
  gobox:
    external: true
    name: gobox
