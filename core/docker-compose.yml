services:
  core:
    build: .
    ports:
      - "3000:8080"
    environment:
      HTTP_PORT: "8080"
      AUTH_GRPC_ADDR: "auth:8081"
      AUTH_HTTP_ADDR: "http://auth:8080"
      LOG_LEVEL: "info"
      LOG_FORMAT: "pretty"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gobox

networks:
  gobox:
    external: true
    name: gobox
