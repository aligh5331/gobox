# Standalone development only. For the full stack, use docker-compose.yml at the project root.
# Networks are external; create them with:
#   docker network create net_edge
#   docker network create net_core_auth
#   docker network create net_core_fileupload
#   docker network create net_core_shortener

services:
  core:
    build: .
    ports:
      - "3000:8080"
    environment:
      HTTP_PORT: "8080"
      AUTH_GRPC_ADDR: "auth:8081"
      AUTH_HTTP_ADDR: "http://auth:8080"
      FILEUPLOAD_GRPC_ADDR: "fileupload:9090"
      SHORTENER_GRPC_ADDR: "shortener:9091"
      THUMBGEN_GRPC_ADDR: "thumbgen:9092"
      LOG_LEVEL: "info"
      LOG_FORMAT: "pretty"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - net_edge
      - net_core_auth
      - net_core_fileupload
      - net_core_shortener
      # net_core_thumbgen — add here in Phase 5

networks:
  net_edge:
    external: true
    name: net_edge
  net_core_auth:
    external: true
    name: net_core_auth
  net_core_fileupload:
    external: true
    name: net_core_fileupload
  net_core_shortener:
    external: true
    name: net_core_shortener
