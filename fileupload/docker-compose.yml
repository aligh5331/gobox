# Standalone development only. For the full stack, use docker-compose.yml at the project root.
# Networks are external; create them with:
#   docker network create net_core_fileupload
#   docker network create net_shortener_fileupload
#   docker network create net_fileupload_data

services:
  fileupload:
    build: .
    expose:
      - "9090"
    networks:
      - net_core_fileupload
      - net_shortener_fileupload
      - net_fileupload_data
    environment:
      DATABASE_URL: postgres://fileupload:fileupload@fileupload-postgres:5432/fileupload?sslmode=disable
      GRPC_PORT: "9090"
      S3_ENDPOINT: minio:9000
      S3_BUCKET: uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      PRESIGN_UPLOAD_TTL_MINUTES: "15"
      PRESIGN_DOWNLOAD_TTL_MINUTES: "60"
      MAX_FILE_SIZE: "104857600"
    depends_on:
      fileupload-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln | grep -q :9090"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  fileupload-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fileupload
      POSTGRES_PASSWORD: fileupload
      POSTGRES_DB: fileupload
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileupload -d fileupload && psql -U fileupload -d fileupload -c 'SELECT 1;'"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - net_fileupload_data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    networks:
      - net_fileupload_data

volumes:
  postgres_data:
  minio_data:

networks:
  net_core_fileupload:
    external: true
    name: net_core_fileupload
  net_shortener_fileupload:
    external: true
    name: net_shortener_fileupload
  net_fileupload_data:
    external: true
    name: net_fileupload_data
