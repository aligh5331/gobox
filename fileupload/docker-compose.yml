version: "3.9"

services:
  fileupload:
    build: .
    ports:
      - "9090:9090"
    networks:
      - gobox
    environment:
      DATABASE_URL: postgres://fileupload:fileupload@postgres:5432/fileupload?sslmode=disable
      GRPC_PORT: "9090"
      S3_ENDPOINT: minio:9000
      S3_BUCKET: uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      PRESIGN_UPLOAD_TTL_MINUTES: "15"
      PRESIGN_DOWNLOAD_TTL_MINUTES: "60"
      MAX_FILE_SIZE: "104857600"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fileupload
      POSTGRES_PASSWORD: fileupload
      POSTGRES_DB: fileupload
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileupload"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - gobox

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    networks:
      - gobox

volumes:
  postgres_data:
  minio_data:

networks:
  gobox:
    external: true
    name: gobox
