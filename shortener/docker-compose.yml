version: "3.9"

services:
  shortener:
    build: .
    ports:
      - "9091:9091"
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://shortener:shortener@shortener-postgres:5432/shortener?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GRPC_PORT: "9091"
      HTTP_PORT: "8082"
      FILEUPLOAD_GRPC_ADDR: fileupload:9090
      BASE_URL: http://localhost:8082
      LOG_LEVEL: info
    depends_on:
      shortener-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gobox

  shortener-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - gobox

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - gobox

networks:
  gobox:
    external: true
    name: gobox

volumes:
  postgres_data:
  redis_data:
