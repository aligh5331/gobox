# Standalone development only. For the full stack, use docker-compose.yml at the project root.
# Networks are external; create them with:
#   docker network create net_core_shortener
#   docker network create net_shortener_fileupload
#   docker network create net_shortener_data
#   docker network create net_edge

services:
  shortener:
    build: .
    ports:
      - "8082:8082"
    expose:
      - "9091"
    environment:
      DATABASE_URL: postgres://shortener:shortener@shortener-postgres:5432/shortener?sslmode=disable
      REDIS_URL: redis://shortener-redis:6379/0
      GRPC_PORT: "9091"
      HTTP_PORT: "8082"
      FILEUPLOAD_GRPC_ADDR: fileupload:9090
      BASE_URL: http://localhost:8082
      LOG_LEVEL: info
    depends_on:
      shortener-postgres:
        condition: service_healthy
      shortener-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - net_core_shortener
      - net_shortener_fileupload
      - net_shortener_data
      - net_edge

  shortener-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener && psql -U shortener -d shortener -c 'SELECT 1;'"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net_shortener_data

  shortener-redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - net_shortener_data

networks:
  net_core_shortener:
    external: true
    name: net_core_shortener
  net_shortener_fileupload:
    external: true
    name: net_shortener_fileupload
  net_shortener_data:
    external: true
    name: net_shortener_data
  net_edge:
    external: true
    name: net_edge

volumes:
  postgres_data:
  redis_data:
